<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
    <style>
        .icon-fill { fill: #000; }
        .icon-stroke { stroke: #000; }
        @media (prefers-color-scheme: dark) {
            .icon-fill { fill: #FFF; }
            .icon-stroke { stroke: #FFF; }
        }
    </style>
    <!-- Calendar base: sharp rectangle with outline -->
    <rect x="16" y="24" width="96" height="88" stroke-width="8" class="icon-stroke" fill="none" />
    <!-- Top bar -->
    <rect x="16" y="24" width="96" height="24" class="icon-fill" />
    <!-- Vertical lines/rings: sharp rectangles -->
    <rect x="32" y="12" width="8" height="24" class="icon-fill" />
    <rect x="88" y="12" width="8" height="24" class="icon-fill" />
    <!-- Play button: sharp triangle -->
    <path d="M52 64 L52 92 L80 78 Z" class="icon-fill" />
</svg>
